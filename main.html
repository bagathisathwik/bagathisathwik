<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;

        }
        container{
            border: 2px solid black;
            padding: 30px;
            border-radius: 10px;

        }
        input{
            width: 400px;
            padding: 10px 0px;
            border-radius: 1px solid black;
            grid-template-columns:auto auto auto;

        }
        #button-container{
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            margin-top: 30px;
        }
        #button-container div{
            border: 2px solid pink;
            padding: 10px;
            border-radius: 8px;
        }
        #button-container div:nth-child(16){
            background-color: rgb(235, 135, 197);
            grid-row-start: 4;
            grid-column-start: 4;
            grid-row-end: 6;
        }
         #button-container div:nth-child(1){
            grid-column-start: 1;
            grid-column-end: 3;
            background-color: aqua;
         }

        
    
        
    </style>
</head>
<body>
    <div class="container">

    <div>
    <input type="number" readonly placeholder="0">
    <div>
        <div id="button-container">
            <div>SIN</div>
            <div>TAN</div>
            <div>AC</div>
            <div>COS</div>
            <div>INT</div>
            <div>DIF</div>
<div>%</div>
            <div>9</div>
            <div>8</div>
            <div>7</div>
             <div>*</div>

            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>1</div>

            <div>
                +
            </div>
            <div>2</div>
            <div>3</div>
            <div>-</div>

            <div>0</div>
            <div>=</div>
            <div>/</div>
            

        </div>
    </div>
  
</body>
</html>
